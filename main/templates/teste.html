<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniTwitter</title>
  <link rel="stylesheet" href="styletest.css">
</head>
<body>
  <header class="navbar">
    <h1 class="navbar-title">MiniTwitter</h1>
  </header>

  <main class="container">
    <section class="tweet-box">
      <h2>O que está acontecendo?</h2>
      <form method="post">
        <!-- {% csrf_token %} -->
        <div class="form-group">
          <label for="autor">Autor:</label>
          <input type="text" id="autor" name="autor" class="form-control">
        </div>

        <div class="form-group">
          <label for="conteudo">Conteúdo:</label>
          <textarea id="conteudo" name="conteudo" class="form-control"></textarea>
        </div>

        <button type="submit" class="btn">Tweetar</button>
      </form>
    </section>

    <section class="posts">
      <!-- {% for post in posts %} -->
      <div class="post">
        <h3 class="post-autor">Jailson Mendes</h3>
        <p class="post-conteudo">Que delícia caraaaaa</p>
        <span class="post-data">09/11/2025</span>
      </div>
      <!-- {% empty %} -->
      <!-- Nenhum post encontrado -->
    </section>
  </main>
</body>
</html>
