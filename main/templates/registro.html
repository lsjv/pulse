<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'base.html' %}
{% load widget_tweaks %}

{% block content %}
<div class="flex justify-center items-center h-screen bg-gray-100">
  <div class="bg-white p-8 rounded-xl shadow-xl w-96">
    <h2 class="text-2xl font-semibold text-center mb-6">Criar conta</h2>

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-4">
          <label class="block text-gray-700">{{ field.label }}</label>
          {% render_field field class="w-full p-2 border rounded-lg" %}
          {% if field.errors %}
            <p class="text-red-500 text-sm">{{ field.errors }}</p>
          {% endif %}
        </div>
      {% endfor %}
      <button class="w-full bg-green-500 hover:bg-green-600 text-white p-2 rounded-lg">
        Registrar
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      Já tem uma conta?
      <a href="{% url 'login' %}" class="text-blue-500 hover:underline">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
</body>
</html>
